
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Simulador - Agendamento Especial</title>
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
body{margin:0;font-family:'Open Sans',sans-serif;background:#eef2f6;color:#1f2937}
header{background:#004b87;color:#fff;padding:18px 28px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 2px 6px rgba(0,0,0,.2)}
.logo{font-size:24px;font-weight:700}
main{max-width:1100px;margin:30px auto;padding:0 20px}
.card{background:#fff;border-radius:14px;padding:24px;box-shadow:0 8px 25px rgba(0,0,0,.08);margin-bottom:20px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}
label{font-weight:600;font-size:14px}
select{width:100%;padding:10px;border:1px solid #ccd5df;border-radius:8px;margin-top:6px}
button{background:#0067b8;color:#fff;border:0;padding:14px 24px;border-radius:8px;font-weight:700;cursor:pointer}
.progress{height:10px;background:#d9e2ec;border-radius:20px;overflow:hidden}
.bar{height:100%;width:0;background:#00a3e0;transition:.4s}
#resultado{display:none}
.ok{background:#e9f8ef;border-left:8px solid #2eaf59}
.err{background:#fdecec;border-left:8px solid #d93025}
.badge{display:inline-block;padding:8px 16px;border-radius:30px;color:#fff;font-weight:700}
.green{background:#2eaf59}.red{background:#d93025}
ul{line-height:1.8}
</style>
</head>
<body>
<header><div class="logo">PORTO ITAPOÁ</div><div>Simulador • Agendamento Especial</div></header>
<main>
<div class="card">
<h2>Simulação</h2>
<div class="progress"><div class="bar" id="bar"></div></div><br>
<div class="grid">
<div><label>Janela superior a 24h?</label><select id="janela"><option>Sim</option><option>Não</option></select></div>
<div><label>Primeiro pedido?</label><select id="primeiro"><option>Não</option><option>Sim</option></select></div>
<div><label>Recusa operacional anterior?</label><select id="recusa"><option>Não</option><option>Sim</option></select></div>
<div><label>Agendamento efetivado e cancelado?</label><select id="efetivado"><option>Não</option><option>Sim</option></select></div>
<div><label>Cancelou antes da análise?</label><select id="analise"><option>Não</option><option>Sim</option></select></div>
<div><label>Janela igual recusada?</label><select id="igual"><option>Não</option><option>Sim</option></select></div>
<div><label>Janela diferente cancelada?</label><select id="dif"><option>Não</option><option>Sim</option></select></div>
</div><br>
<button onclick="simular()">Simular Cobrança</button>
</div>

<div id="resultado" class="card">
<h2>Resultado</h2>
<div id="tipo"></div>
<p id="texto"></p>
<h3>Regras analisadas</h3>
<ul id="lista"></ul>
</div>
</main>
<script>
document.querySelectorAll("select").forEach((s,i,a)=>s.onchange=()=>bar.style.width=((Array.from(a).filter(x=>x.value).length/a.length)*100)+'%');
function v(id){return document.getElementById(id).value==="Sim";}
function simular(){
let regras=[];
let tipo,motivo;
if(!v("janela")){tipo="EXCEÇÃO";motivo="Solicitação dentro de 24 horas.";regras.push("Janela inferior a 24h");}
else if(v("efetivado")){tipo="EXCEÇÃO";motivo="Container possui agendamento efetivado e cancelado.";regras.push("Agendamento efetivado");}
else if(v("igual")){tipo="EXCEÇÃO";motivo="Cliente recusou janela igual à solicitada.";regras.push("Recusa da mesma janela");}
else if(v("primeiro")){tipo="ENCAIXE";motivo="Primeiro pedido com janela superior a 24h.";regras.push("Primeiro pedido");}
else if(v("recusa")){tipo="ENCAIXE";motivo="Novo pedido após recusa operacional.";regras.push("Recusa operacional");}
else if(v("dif")){tipo="ENCAIXE";motivo="Cliente cancelou janela diferente da solicitada.";regras.push("Janela alterada");}
else if(v("analise")){tipo="ENCAIXE";motivo="Novo pedido após cancelamento antes da análise.";regras.push("Cancelamento antes da análise");}
else{tipo="EXCEÇÃO";motivo="Nenhuma regra de encaixe encontrada.";}

resultado.style.display="block";
resultado.className="card "+(tipo=="ENCAIXE"?"ok":"err");
tipoDiv='<span class="badge '+(tipo=="ENCAIXE"?'green':'red')+'">'+tipo+'</span>';
document.getElementById("tipo").innerHTML=tipoDiv;
document.getElementById("texto").innerHTML="<b>Cobrança:</b> "+(tipo=="ENCAIXE"?"Não será aplicada":"Será aplicada")+"<br><br><b>Motivo:</b> "+motivo;
document.getElementById("lista").innerHTML=regras.map(r=>"<li>✔ "+r+"</li>").join("");
}
</script>
</body></html>
